<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情感陪伴助手 - 大模型版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }
        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .message.user .message-avatar { background: #e3f2fd; order: 1; }
        .message.assistant .message-avatar { background: #f3e5f5; order: 0; }
        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        #userInput:focus { border-color: #667eea; }
        #sendBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }
        #sendBtn:hover { transform: scale(1.05); }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        .analysis-box {
            background: #fff3e0;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #ff9800;
            font-size: 13px;
        }
        .config-panel {
            background: #f0f0f0;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .config-panel input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💙 情感陪伴助手</h1>
            <p>大模型情感识别 + 心理学策略</p>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="config-panel">
                <strong>⚙️ 配置（可选）</strong>
                <input type="text" id="apiKey" placeholder="硅基流动 API Key">
                <input type="text" id="model" placeholder="模型" value="Qwen/Qwen2.5-72B-Instruct">
            </div>
            
            <div class="message assistant">
                <div class="message-avatar">🤖</div>
                <div>
                    <div class="message-content">
                        您好！我是您的情感陪伴助手。<br>
                        有什么想和我聊的吗？
                    </div>
                </div>
            </div>
        </div>
        
        <div class="input-container">
            <input type="text" id="userInput" placeholder="请输入您想说的话..." onkeypress="if(event.keyCode===13) sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://100.100.30.150';
        
        async function analyzeWithLLM(text, apiKey, model) {
            if (!apiKey) {
                // Fallback to simple rules - 风险检测优先
                if (text.includes('不想活') || text.includes('想死') || text.includes('自杀') || text.includes('活着没意义') || text.includes('轻生')) {
                    return { emotion: 'sad', stage: 'neutral', intensity: 'high', risk: 'high', strategy: 'SAFETY' };
                }
                if (text.includes('难过') || text.includes('心情不好') || text.includes('不开心')) {
                    return { emotion: 'sad', stage: 'venting', intensity: 'medium', risk: 'low', strategy: 'MUSIC_OFFER' };
                }
                if (text.includes('怎么办') || text.includes('建议')) {
                    return { emotion: 'anxious', stage: 'help', intensity: 'medium', risk: 'low', strategy: 'GUIDANCE_LIGHT' };
                }
                if (text.includes('开心') || text.includes('高兴')) {
                    return { emotion: 'positive', stage: 'neutral', intensity: 'medium', risk: 'low', strategy: 'JOY_SHARE' };
                }
                return { emotion: 'neutral', stage: 'neutral', intensity: 'low', risk: 'low', strategy: 'COMPANY' };
            }
            
            try {
                const response = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [{
                            role: 'user',
                            content: `请分析用户情感，输出 JSON：
用户输入："${text}"
输出格式：{"emotion":"sad/angry/anxious/positive/neutral","stage":"venting/help/neutral","intensity":"low/medium/high","risk":"low/high","strategy":"策略名"}
只输出 JSON。`
                        }],
                        temperature: 0.3,
                        max_tokens: 300
                    })
                });
                
                if (response.ok) {
                    const result = await response.json();
                    const content = result.choices[0].message.content;
                    const jsonMatch = content.match(/\{[^{}]*\}/s);
                    if (jsonMatch) {
                        return JSON.parse(jsonMatch[0]);
                    }
                }
            } catch (e) {
                console.error('LLM 分析失败:', e);
            }
            
            return { emotion: 'neutral', stage: 'neutral', intensity: 'low', risk: 'low', strategy: 'COMPANY' };
        }
        
        function addMessage(content, isUser, analysis = null) {
            const container = document.getElementById('chatContainer');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            let analysisHtml = '';
            if (analysis && !isUser) {
                analysisHtml = `<div class="analysis-box">
                    <strong>📊 分析：</strong>情绪=${analysis.emotion} | 状态=${analysis.stage} | 强度=${analysis.intensity} | 策略=${analysis.strategy}
                </div>`;
            }
            
            msgDiv.innerHTML = `
                ${!isUser ? '<div class="message-avatar">🤖</div>' : ''}
                <div>
                    ${analysisHtml}
                    <div class="message-content">${content.replace(/\n/g, '<br>')}</div>
                </div>
                ${isUser ? '<div class="message-avatar">👤</div>' : ''}
            `;
            
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const apiKey = document.getElementById('apiKey').value;
            const model = document.getElementById('model').value;
            const text = input.value.trim();
            
            if (!text) return;
            
            addMessage(text, true);
            input.value = '';
            btn.disabled = true;
            
            // LLM 分析
            const analysis = await analyzeWithLLM(text, apiKey, model);
            
            // 调用情感响应 API
            try {
                const response = await fetch(`${API_BASE}/api/v1/emotion/respond`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        emotion: analysis.emotion,
                        stage: analysis.stage,
                        intensity: analysis.intensity,
                        risk: analysis.risk,
                        context: {}
                    })
                });
                
                const result = await response.json();
                addMessage(result.response_text, false, analysis);
                
            } catch (e) {
                addMessage(`抱歉，出错了：${e.message}`, false);
            }
            
            btn.disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
